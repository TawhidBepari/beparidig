<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — BepariDig</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 24px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 18px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
    }

    .muted {
      color: #aaa;
      font-size: 0.9rem;
    }

    .logout {
      margin-top: 24px;
      background: #ff5c5c;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card" id="app">
    <h1>Checking session…</h1>
    <p class="muted">Please wait</p>
  </div>

<script>
(async () => {
  const app = document.getElementById("app");

  // 1️⃣ Read token from localStorage
  const token = localStorage.getItem("admin_session_token");

  if (!token) {
    window.location.href = "/admin/login.html";
    return;
  }

  try {
    // 2️⃣ Verify session with backend
    const res = await fetch(
      "/.netlify/functions/admin-verify-session?token=" + encodeURIComponent(token),
      { cache: "no-store" }
    );

    const data = await res.json();

    if (!res.ok || !data.valid) {
      localStorage.removeItem("admin_session_token");
      window.location.href = "/admin/login.html";
      return;
    }

    // 3️⃣ Session valid → render dashboard
    app.innerHTML = `
      <h1>Admin Dashboard</h1>
      <p class="muted">Logged in as ${data.admin_email}</p>

      <hr style="margin:20px 0;border-color:#333">

      <p>✅ Admin access confirmed.</p>
      <p>Next: product management, uploads, analytics.</p>

      <button class="logout" id="logoutBtn">Log out</button>
    `;

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("admin_session_token");
      window.location.href = "/admin/login.html";
    };

  } catch (err) {
    console.error(err);
    window.location.href = "/admin/login.html";
  }
})();
</script>
</body>
</html>
