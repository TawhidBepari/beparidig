<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — BepariDig</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 24px;
      max-width: 800px;
      margin: auto;
      box-shadow: 0 0 18px rgba(0,0,0,0.4);
    }

    input, textarea, select {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .primary {
      background: #4caf50;
      width: 100%;
    }

    .logout {
      margin-top: 20px;
      background: #ff5c5c;
    }

    .muted {
      color: #aaa;
      font-size: 0.9rem;
    }

    .success {
      color: #6dff9c;
      display: none;
    }

    .error {
      color: #ff6b6b;
      display: none;
    }
  </style>
</head>

<body>
<div class="card" id="app">
  <h1>Checking session…</h1>
</div>

<script>
(async () => {
  const app = document.getElementById("app");
  const token = localStorage.getItem("admin_token");

  if (!token) {
    window.location.href = "/admin/login.html";
    return;
  }

  try {
    const res = await fetch(
      "/.netlify/functions/admin-verify-session?token=" + encodeURIComponent(token),
      { cache: "no-store" }
    );

    const data = await res.json();

    if (!res.ok || !data.valid) {
      localStorage.removeItem("admin_token");
      window.location.href = "/admin/login.html";
      return;
    }

    app.innerHTML = `
      <h1>Admin Dashboard</h1>
      <p class="muted">Logged in as ${data.admin_email}</p>

      <hr style="margin:20px 0;border-color:#333">

      <h2>Add Product</h2>

      <form id="productForm">
        <label>Name</label>
        <input id="name" required />

        <label>Slug</label>
        <input id="slug" required />

        <label>Price</label>
        <input id="price" type="number" step="0.01" required />

        <label>Currency</label>
        <input id="currency" value="USD" />

        <label>Description</label>
        <textarea id="description"></textarea>

        <label>File Path</label>
        <input id="file_path" />

        <label>Cover Image</label>
        <input id="cover_image" />

        <label>Dodo Product ID</label>
        <input id="dodo_product_id" />

        <button class="primary" type="submit">Create Product</button>

        <p class="success" id="successMsg">✅ Product created</p>
        <p class="error" id="errorMsg"></p>
      </form>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Your Products</h2>
      <div id="productList"></div>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Installment Plans</h2>
      <div id="planList"></div>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Create Installment Plan</h2>

      <form id="installmentForm">
        <label>Product</label>
        <select id="plan_product" required></select>

        <label>Plan Name</label>
        <input id="plan_name" required />

        <label>Number of Installments</label>
        <input id="plan_count" type="number" required />

        <label>Price per Installment</label>
        <input id="plan_price" type="number" step="0.01" required />

        <label>Intervals (days)</label>
        <input id="plan_intervals" placeholder="0,15,30" required />

        <button class="primary" type="submit">Create Plan</button>

        <p class="success" id="planSuccess">✅ Plan created</p>
        <p class="error" id="planError"></p>
      </form>

      <button class="logout" id="logoutBtn">Log out</button>
    `;

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("admin_token");
      window.location.href = "/admin/login.html";
    };

    // CREATE PRODUCT
    const form = document.getElementById("productForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      await fetch("/.netlify/functions/admin-create-product", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          slug: document.getElementById("slug").value,
          price: parseFloat(document.getElementById("price").value),
          currency: document.getElementById("currency").value,
          description: document.getElementById("description").value,
          file_path: document.getElementById("file_path").value,
          cover_image: document.getElementById("cover_image").value,
          dodo_product_id: document.getElementById("dodo_product_id").value
        })
      });

      form.reset();
      loadProducts();
      loadProductList();
    });

    async function loadProducts() {
      const res = await fetch("/.netlify/functions/admin-get-products", {
        headers: { "Authorization": "Bearer " + token }
      });

      const products = await res.json();
      const select = document.getElementById("plan_product");
      select.innerHTML = "";

      products.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        select.appendChild(opt);
      });
    }

    async function loadProductList() {
      const res = await fetch("/.netlify/functions/admin-get-products", {
        headers: { "Authorization": "Bearer " + token }
      });

      const products = await res.json();
      const container = document.getElementById("productList");
      container.innerHTML = "";

      products.forEach(p => {
        const row = document.createElement("div");

        row.innerHTML = `
          <strong>${p.name}</strong>
          <button data-id="${p.id}" style="margin-left:10px;background:#ff5c5c;color:#fff;">
            Delete
          </button>
        `;

        container.appendChild(row);
      });

      document.querySelectorAll("#productList button").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");

          await fetch("/.netlify/functions/admin-delete-product", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ id })
          });

          loadProductList();
          loadProducts();
          loadPlans();
        };
      });
    }

    async function loadPlans() {
      const [productsRes, plansRes] = await Promise.all([
        fetch("/.netlify/functions/admin-get-products", {
          headers: { "Authorization": "Bearer " + token }
        }),
        fetch("/.netlify/functions/admin-get-installment-plans", {
          headers: { "Authorization": "Bearer " + token }
        })
      ]);

      const products = await productsRes.json();
      const plans = await plansRes.json();

      const container = document.getElementById("planList");
      container.innerHTML = "";

      products.forEach(product => {
        const productPlans = plans.filter(p => p.product_id === product.id);
        if (productPlans.length === 0) return;

        const block = document.createElement("div");
        block.innerHTML = `<h3>${product.name}</h3>`;

        productPlans.forEach(plan => {
          const row = document.createElement("div");

          row.innerHTML = `
            ${plan.name} (${plan.installments_count} × $${plan.installment_price})
            <button data-id="${plan.id}" style="margin-left:10px;background:#ff5c5c;color:#fff;">
              Delete
            </button>
          `;

          block.appendChild(row);
        });

        container.appendChild(block);
      });

      document.querySelectorAll("#planList button").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");

          await fetch("/.netlify/functions/admin-delete-installment-plan", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ id })
          });

          loadPlans();
        };
      });
    }

    loadProducts();
    loadProductList();
    loadPlans();

    // CREATE PLAN
    const planForm = document.getElementById("installmentForm");

    planForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const intervals = document.getElementById("plan_intervals").value
        .split(",")
        .map(n => parseInt(n.trim()));

      await fetch("/.netlify/functions/admin-create-installment-plan", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          product_id: document.getElementById("plan_product").value,
          name: document.getElementById("plan_name").value,
          installments_count: parseInt(document.getElementById("plan_count").value),
          installment_price: parseFloat(document.getElementById("plan_price").value),
          intervals
        })
      });

      planForm.reset();
      loadPlans();
    });

  } catch {
    window.location.href = "/admin/login.html";
  }
})();
</script>
</body>
</html>
