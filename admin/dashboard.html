<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — BepariDig</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 24px;
      max-width: 800px;
      margin: auto;
      box-shadow: 0 0 18px rgba(0,0,0,0.4);
    }

    input, textarea, select {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .primary {
      background: #4caf50;
      width: 100%;
    }

    .logout {
      margin-top: 20px;
      background: #ff5c5c;
    }

    .muted {
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="card" id="app">
  <h1>Checking session…</h1>
</div>

<script>
(async () => {
  const app = document.getElementById("app");
  const token = localStorage.getItem("admin_token");

  if (!token) {
    window.location.href = "/admin/login.html";
    return;
  }

  try {
    const res = await fetch(
      "/.netlify/functions/admin-verify-session?token=" + encodeURIComponent(token),
      { cache: "no-store" }
    );

    const data = await res.json();

    if (!res.ok || !data.valid) {
      localStorage.removeItem("admin_token");
      window.location.href = "/admin/login.html";
      return;
    }

    app.innerHTML = `
      <h1>Admin Dashboard</h1>
      <p class="muted">Logged in as ${data.admin_email}</p>

      <hr style="margin:20px 0;border-color:#333">

      <h2>Add Product</h2>

      <form id="productForm">
        <input id="name" placeholder="Name" required />
        <input id="slug" placeholder="Slug" required />
        <input id="price" type="number" step="0.01" placeholder="Price" required />
        <input id="currency" value="USD" />
        <textarea id="description" placeholder="Description"></textarea>
        <input id="file_path" placeholder="File Path" />
        <input id="cover_image" placeholder="Cover Image" />
        <input id="dodo_product_id" placeholder="Dodo Product ID" />

        <button class="primary" type="submit">Create Product</button>
      </form>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Your Products</h2>
      <div id="productList"></div>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Installment Plans</h2>
      <div id="planList"></div>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Create Installment Plan</h2>

      <form id="installmentForm">
        <select id="plan_product" required></select>
        <input id="plan_name" placeholder="Plan Name" required />
        <input id="plan_count" type="number" placeholder="Installments count" required />
        <input id="plan_price" type="number" step="0.01" placeholder="Price per installment" required />
        <input id="plan_intervals" placeholder="0,15,30" required />

        <button class="primary" type="submit">Create Plan</button>
      </form>

      <hr style="margin:40px 0;border-color:#333">

      <h2>Payment Requests</h2>
      <div id="requestList"></div>

      <button class="logout" id="logoutBtn">Log out</button>
    `;

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("admin_token");
      window.location.href = "/admin/login.html";
    };

    // ================= PRODUCTS =================
    async function loadProducts() {
      const res = await fetch("/.netlify/functions/admin-get-products", {
        headers: { "Authorization": "Bearer " + token }
      });

      const products = await res.json();
      const select = document.getElementById("plan_product");
      select.innerHTML = "";

      products.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        select.appendChild(opt);
      });
    }

    async function loadProductList() {
      const res = await fetch("/.netlify/functions/admin-get-products", {
        headers: { "Authorization": "Bearer " + token }
      });

      const products = await res.json();
      const container = document.getElementById("productList");
      container.innerHTML = "";

      products.forEach(p => {
        const row = document.createElement("div");

        row.innerHTML = `
          <strong>${p.name}</strong>
          <button data-id="${p.id}" style="margin-left:10px;background:#ff5c5c;color:#fff;">Delete</button>
        `;

        container.appendChild(row);
      });

      document.querySelectorAll("#productList button").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");

          await fetch("/.netlify/functions/admin-delete-product", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ id })
          });

          loadProductList();
          loadProducts();
          loadPlans();
        };
      });
    }

    // ================= PLANS =================
    async function loadPlans() {
      const [productsRes, plansRes] = await Promise.all([
        fetch("/.netlify/functions/admin-get-products", {
          headers: { "Authorization": "Bearer " + token }
        }),
        fetch("/.netlify/functions/admin-get-installment-plans", {
          headers: { "Authorization": "Bearer " + token }
        })
      ]);

      const products = await productsRes.json();
      const plans = await plansRes.json();

      const container = document.getElementById("planList");
      container.innerHTML = "";

      products.forEach(product => {
        const productPlans = plans.filter(p => p.product_id === product.id);
        if (productPlans.length === 0) return;

        const block = document.createElement("div");
        block.innerHTML = `<h3>${product.name}</h3>`;

        productPlans.forEach(plan => {
          const row = document.createElement("div");

          row.innerHTML = `
            ${plan.name} (${plan.installments_count} × $${plan.installment_price})
            <button data-id="${plan.id}" style="margin-left:10px;background:#ff5c5c;color:#fff;">Delete</button>
          `;

          block.appendChild(row);
        });

        container.appendChild(block);
      });

      document.querySelectorAll("#planList button").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");

          await fetch("/.netlify/functions/admin-delete-installment-plan", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ id })
          });

          loadPlans();
        };
      });
    }

    // ================= REQUESTS =================
    async function loadRequests() {
      const res = await fetch("/.netlify/functions/admin-get-installment-requests", {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();
      const container = document.getElementById("requestList");
      container.innerHTML = "";

      data.forEach(r => {
        const row = document.createElement("div");

        row.innerHTML = `
          <strong>${r.email}</strong> —
          ${r.products?.name || "Unknown"} —
          ${r.type}
          ${r.installment_plans?.name ? " (" + r.installment_plans.name + ")" : ""}
          <button data-id="${r.id}" style="margin-left:10px;background:#4caf50;color:#fff;">
            Done
          </button>
        `;

        container.appendChild(row);
      });

      document.querySelectorAll("#requestList button").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");

          await fetch("/.netlify/functions/admin-delete-installment-request", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ id })
          });

          loadRequests();
        };
      });
    }

    // ================= CREATE =================
    document.getElementById("productForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      await fetch("/.netlify/functions/admin-create-product", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          name: name.value,
          slug: slug.value,
          price: parseFloat(price.value),
          currency: currency.value,
          description: description.value,
          file_path: file_path.value,
          cover_image: cover_image.value,
          dodo_product_id: dodo_product_id.value
        })
      });

      e.target.reset();
      loadProducts();
      loadProductList();
    });

    document.getElementById("installmentForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const intervals = plan_intervals.value.split(",").map(n => parseInt(n.trim()));

      await fetch("/.netlify/functions/admin-create-installment-plan", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          product_id: plan_product.value,
          name: plan_name.value,
          installments_count: parseInt(plan_count.value),
          installment_price: parseFloat(plan_price.value),
          intervals
        })
      });

      e.target.reset();
      loadPlans();
    });

    // INIT
    loadProducts();
    loadProductList();
    loadPlans();
    loadRequests();

  } catch {
    window.location.href = "/admin/login.html";
  }
})();
</script>
</body>
</html>
